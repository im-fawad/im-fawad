<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%" stop-color="#181135"/>
      <stop offset="75%" stop-color="#3a1160"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#00f5ff"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="55%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.6" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <circle cx="150" cy="60" r="120" fill="#6d28d9" opacity="0.12"/>
  <circle cx="1080" cy="220" r="140" fill="#00f5ff" opacity="0.08"/>

  <text x="600" y="128" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="2">
    FAWAD SAJID
  </text>

  <text x="600" y="172" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="500" fill="#a78bfa" letter-spacing="3">
    FLUTTER DEVELOPER &#183; FULL STACK ENTHUSIAST
  </text>

  <path d="M0,220 C150,260 300,190 450,225 C600,260 750,195 900,225 C1050,255 1150,215 1200,230 L1200,280 L0,280 Z"
        fill="url(#waveGrad)" opacity="0.9"/>
  <path d="M0,235 C150,270 300,205 450,238 C600,270 750,210 900,238 C1050,265 1150,230 1200,242 L1200,280 L0,280 Z"
        fill="url(#waveGrad)" opacity="0.5"/>
</svg>
